<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อใบหน้าอัจฉริยะ</title>
    <!-- โหลด Library และ Font -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8;
            --success: #34a853;
            --warning: #fbbc04;
            --danger: #ea4335;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            color: #3c4043;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 20px; }

        /* Dashboard Styles */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }

        .stat-card h3 { margin: 0; font-size: 14px; color: #70757a; }
        .stat-card div { font-size: 28px; font-weight: 500; margin-top: 5px; }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            line-height: 0;
        }

        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }

        /* Lists */
        .list-container {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #fdfdfd;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid #dadce0;
        }

        .user-item.present { border-left-color: var(--success); background: #e6f4ea; }

        .user-avatar {
            width: 35px; height: 35px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 14px;
        }

        /* Controls */
        .controls { margin-top: 15px; }
        .btn {
            width: 100%; padding: 12px;
            border: none; border-radius: 8px;
            font-size: 16px; cursor: pointer;
            font-family: 'Kanit'; font-weight: 500;
            transition: 0.2s;
        }
        .btn-scan { background: var(--success); color: white; margin-bottom: 10px; }
        .btn-reg { background: var(--primary); color: white; width: 100px; }
        
        input {
            padding: 10px; border: 1px solid #ddd; border-radius: 5px;
            width: calc(100% - 120px); font-family: 'Kanit';
        }

        .status-badge {
            padding: 5px 12px; border-radius: 20px;
            font-size: 12px; margin-bottom: 10px; display: inline-block;
        }
        .bg-wait { background: #fff3e0; color: #e67e22; }
        .bg-ready { background: #e6f4ea; color: #1e8e3e; }

        @media (max-width: 850px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📸 ระบบเช็คชื่อใบหน้าอัจฉริยะ</h1>

        <!-- Dashboard -->
        <div class="dashboard">
            <div class="stat-card"><h3>ลงทะเบียนแล้ว</h3><div id="stat-total">0</div></div>
            <div class="stat-card" style="border-color: var(--success);"><h3>มาแล้ววันนี้</h3><div id="stat-present">0</div></div>
            <div class="stat-card" style="border-color: var(--danger);"><h3>ยังไม่มา</h3><div id="stat-absent">0</div></div>
        </div>

        <div class="main-grid">
            <!-- ฝั่งซ้าย: กล้อง -->
            <div class="box">
                <div id="msg" class="status-badge bg-wait">กำลังโหลดโมเดล AI...</div>
                <div class="video-wrapper">
                    <video id="video" autoplay muted></video>
                </div>
                <div class="controls">
                    <button class="btn btn-scan" onclick="startRecognition()">▶️ เริ่มระบบเช็คชื่อ (สแกนใบหน้า)</button>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="regName" placeholder="ระบุชื่อเพื่อลงทะเบียน/อัปเดตรูป">
                        <button class="btn btn-reg" onclick="handleRegister()">บันทึกรูป</button>
                    </div>
                </div>
            </div>

            <!-- ฝั่งขวา: รายชื่อและประวัติ -->
            <div class="box">
                <h3 style="margin:0 0 10px 0;">👥 สมาชิกทั้งหมด</h3>
                <div id="all-users" class="list-container" style="height: 250px;"></div>
                
                <h3 style="margin:20px 0 10px 0;">🕒 บันทึกเวลาล่าสุด</h3>
                <div id="history-log" class="list-container" style="height: 200px;"></div>
            </div>
        </div>
    </div>

    <script>
        // กำหนดค่าตั้งต้น
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzh2ytLQUMlnBlekS2W1fX-bKHQJgRjCSLXDtiMpvLHDrqcbK8MlKMPtD6qu3ux-8X5/exec";
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        
        let faceMatcher;
        let isLivenessPassed = false;
        let registeredUsers = [];
        let attendanceToday = [];

        // 1. เริ่มโหลดระบบ
        window.onload = async () => {
            try {
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                document.getElementById('video').srcObject = stream;
                
                await refreshUI();
                document.getElementById('msg').className = "status-badge bg-ready";
                document.getElementById('msg').innerText = "✅ ระบบพร้อมใช้งาน";
            } catch (err) {
                document.getElementById('msg').innerText = "❌ ไม่สามารถโหลดกล้อง/โมเดลได้";
            }
        };

        // 2. ดึงข้อมูลจาก Google Sheets และอัปเดตหน้าจอ
        async function refreshUI() {
            try {
                const [uRes, dRes, aRes] = await Promise.all([
                    fetch(SCRIPT_URL),
                    fetch(SCRIPT_URL + "?type=dashboard"),
                    fetch(SCRIPT_URL + "?type=attendance")
                ]);

                registeredUsers = await uRes.json();
                const dash = await dRes.json();
                attendanceToday = await aRes.json();

                // อัปเดตตัวเลข Dashboard
                document.getElementById('stat-total').innerText = dash.total;
                document.getElementById('stat-present').innerText = dash.present;
                document.getElementById('stat-absent').innerText = dash.absent;

                // วาดรายชื่อสมาชิก
                document.getElementById('all-users').innerHTML = registeredUsers.map(u => {
                    const isPresent = attendanceToday.some(a => a[0] === u[0]);
                    return `
                        <div class="user-item ${isPresent ? 'present' : ''}">
                            <div class="user-avatar">${u[0].charAt(0)}</div>
                            <div style="flex:1">
                                <div style="font-size:14px; font-weight:500;">${u[0]}</div>
                                <div style="font-size:11px; color:#888;">${isPresent ? '✅ เช็คอินแล้ว' : '⌛ ยังไม่มา'}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                // วาดประวัติล่าสุด
                document.getElementById('history-log').innerHTML = attendanceToday.map(h => `
                    <div class="user-item present">
                        <div style="font-size:13px"><b>${h[0]}</b> <span style="float:right; color:#666">${new Date(h[1]).toLocaleTimeString('th-TH')}</span></div>
                    </div>
                `).join('');

            } catch (e) { console.error("Refresh Error:", e); }
        }

        // 3. เริ่มโหมดสแกนใบหน้า
        async function startRecognition() {
            if(registeredUsers.length === 0) return alert("ยังไม่มีข้อมูลผู้ลงทะเบียน");
            
            document.getElementById('msg').innerText = "⌛ กำลังโหลดฐานข้อมูลใบหน้า...";
            
            // โหลดรูปจาก Drive มาทำ Descriptor
            const labeledDescriptors = await Promise.all(registeredUsers.map(async user => {
                try {
                    const imgUrl = `https://lh3.googleusercontent.com/d/${user[1]}`;
                    const img = await faceapi.fetchImage(imgUrl);
                    const det = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                    return new faceapi.LabeledFaceDescriptors(user[0], [det.descriptor]);
                } catch(e) { return null; }
            }));

            const validDescriptors = labeledDescriptors.filter(d => d !== null);
            faceMatcher = new faceapi.FaceMatcher(validDescriptors, 0.6);

            const video = document.getElementById('video');
            const canvas = faceapi.createCanvasFromMedia(video);
            document.querySelector('.video-wrapper').append(canvas);
            const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
            faceapi.matchDimensions(canvas, displaySize);

            document.getElementById('msg').className = "status-badge bg-wait";
            document.getElementById('msg').innerText = "👁️ กรุณากระพริบตาเพื่อเช็คชื่อ";

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resized = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                resized.forEach(d => {
                    const match = faceMatcher.findBestMatch(d.descriptor);
                    // วาดกรอบและชื่อ (Feature 1)
                    new faceapi.draw.DrawBox(d.detection.box, { label: match.toString() }).draw(canvas);

                    // ตรวจการกระพริบตา (Feature 2)
                    const landmarks = d.landmarks;
                    const leftEye = landmarks.getLeftEye();
                    const eyeDist = Math.abs(leftEye[1].y - leftEye[5].y);

                    if (eyeDist < 3.2 && match.label !== 'unknown') {
                        isLivenessPassed = true;
                        handleCheckIn(match.label);
                    }
                });
            }, 100);
        }

        let lastUser = "";
        async function handleCheckIn(name) {
            if (lastUser === name || !isLivenessPassed) return;
            lastUser = name;
            
            document.getElementById('msg').innerText = "✅ บันทึกเวลา: " + name;
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'checkin', name: name }) 
            });
            
            await refreshUI();
            setTimeout(() => { 
                lastUser = ""; 
                isLivenessPassed = false; 
                document.getElementById('msg').innerText = "👁️ กรุณากระพริบตาเพื่อเช็คชื่อ";
            }, 8000);
        }

        // 4. ลงทะเบียนใหม่ / อัปเดตรูป
        async function handleRegister() {
            const name = document.getElementById('regName').value;
            if(!name) return alert("กรุณาระบุชื่อ");

            document.getElementById('msg').innerText = "⌛ กำลังถ่ายรูป...";
            const video = document.getElementById('video');
            const det = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            
            if(!det) return alert("ไม่พบใบหน้า กรุณาจ้องหน้ากล้อง");

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg').split(',')[1];

            document.getElementById('msg').innerText = "⌛ กำลังอัปโหลดไปยังระบบ...";
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'register', name: name, image: base64 }) 
            });

            alert("บันทึกข้อมูลสำเร็จ");
            document.getElementById('regName').value = "";
            await refreshUI();
        }
    </script>
</body>
</html>
