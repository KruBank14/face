<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceID Pro V3 - Smart Thresholds</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --success: #00ff88; --danger: #ff0055; --warning: #ffb100; --dark-bg: #0f172a; }
        body { font-family: 'Kanit', sans-serif; background: var(--dark-bg); color: #fff; margin: 0; padding: 20px; }
        
        /* Dashboard */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto 25px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(10px); }
        .stat-card h3 { margin: 0; font-size: 12px; color: var(--primary); font-family: 'Orbitron'; letter-spacing: 1px; }
        .stat-card .value { font-size: 30px; font-weight: 700; margin-top: 5px; font-family: 'Orbitron'; }

        /* Layout */
        .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 25px; max-width: 1300px; margin: 0 auto; }
        
        /* Video Section */
        .video-box { position: relative; border-radius: 20px; overflow: hidden; border: 2px solid rgba(0, 210, 255, 0.2); background: #000; line-height: 0; }
        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; }

        /* Quality Indicator */
        .quality-meter { margin-top: 10px; background: #1e293b; height: 10px; border-radius: 5px; overflow: hidden; position: relative; }
        #quality-bar { width: 0%; height: 100%; background: var(--danger); transition: 0.3s; }

        /* Form & List */
        .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-family: 'Kanit'; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-scan { background: var(--primary); color: #000; font-family: 'Orbitron'; font-size: 14px; }
        .btn-reg { background: var(--success); color: #000; font-size: 16px; }
        .btn-reg:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        input { width: calc(100% - 30px); padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff; font-family: 'Kanit'; margin-bottom: 10px; outline: none; }
        
        .list-box { max-height: 350px; overflow-y: auto; margin-top: 15px; }
        .row { display: flex; align-items: center; padding: 10px; background: rgba(255,255,255,0.03); margin-bottom: 8px; border-radius: 10px; border-left: 4px solid var(--primary); font-size: 14px; }
        .row.present { border-left-color: var(--success); }

        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-block; margin-bottom: 10px; font-family: 'Orbitron'; }
        .bg-wait { background: #334155; color: #94a3b8; }
        .bg-ready { background: var(--primary); color: #000; box-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>

    <h3 style="text-align: center; font-family: 'Orbitron'; letter-spacing: 3px; color: var(--primary);">FACE_ID_PRO : THRESHOLD_V3</h3>

    <div class="dashboard">
        <div class="stat-card"><h3>TOTAL_MEMBERS</h3><div class="value" id="stat-total">0</div></div>
        <div class="stat-card"><h3>PRESENT_TODAY</h3><div class="value" id="stat-present" style="color:var(--success)">0</div></div>
        <div class="stat-card"><h3>ABSENT</h3><div class="value" id="stat-absent" style="color:var(--danger)">0</div></div>
    </div>

    <div class="main-grid">
        <!-- 🎥 กล้องและตัววัดคุณภาพ -->
        <div>
            <div id="sys-status" class="status-pill bg-wait">LOADING_AI_MODELS...</div>
            <div class="video-box" id="video-container">
                <video id="video" autoplay muted></video>
            </div>
            <div class="quality-meter">
                <div id="quality-bar"></div>
            </div>
            <div id="quality-text" style="font-size: 12px; margin-top: 5px; color: var(--danger);">FACE QUALITY: 0% (LOW)</div>
            
            <button class="btn btn-scan" onclick="startRecognition()">▶ START_AUTO_SCAN_MODE</button>
        </div>

        <!-- 📋 ลงทะเบียนและประวัติ -->
        <div class="panel">
            <h4 style="margin: 0 0 10px 0; font-family: 'Orbitron'; font-size: 14px; color: var(--primary);">REGISTER_UNIT</h4>
            <input type="text" id="regName" placeholder="ENTER_NAME_HERE">
            <button id="regBtn" class="btn btn-reg" onclick="registerFace()" disabled>CAPTURE_FACE (REQUIRES 85%)</button>
            
            <h4 style="margin: 25px 0 10px 0; font-family: 'Orbitron'; font-size: 14px;">ATTENDANCE_LOG</h4>
            <div id="attendance-list" class="list-box"></div>
        </div>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzh2ytLQUMlnBlekS2W1fX-bKHQJgRjCSLXDtiMpvLHDrqcbK8MlKMPtD6qu3ux-8X5/exec";
    const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';

    // *** ตั้งค่า THRESHOLDS (เกณฑ์แนะนำ) ***
    const THRESHOLD_REG = 0.85; // 85% สำหรับลงทะเบียน
    const THRESHOLD_SCAN = 0.75; // 75% สำหรับเช็คชื่อ
    const MATCH_ACCURACY = 0.6; // ความแม่นยำในการเปรียบเทียบ (ยิ่งน้อยยิ่งเข้มงวด)

    let registeredUsers = [];
    let isBlinked = false;
    let faceMatcher;
    let verifiedName = ""; 

    window.onload = async () => {
        try {
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
            document.getElementById('video').srcObject = stream;
            
            await refreshData();
            document.getElementById('sys-status').innerText = "SYSTEM_READY";
            document.getElementById('sys-status').className = "status-pill bg-ready";
            
            monitorFaceQuality(); // เริ่มตรวจสอบคุณภาพใบหน้าแบบเรียลไทม์
        } catch (e) { alert("Camera Access Error: " + e.message); }
    };

    // --- ตรวจสอบคุณภาพใบหน้าแบบ Real-time ---
    async function monitorFaceQuality() {
        const video = document.getElementById('video');
        const bar = document.getElementById('quality-bar');
        const text = document.getElementById('quality-text');
        const btn = document.getElementById('regBtn');

        setInterval(async () => {
            const det = await faceapi.detectSingleFace(video);
            
            if (det) {
                const score = det.score;
                const scorePercent = Math.round(score * 100);
                
                bar.style.width = scorePercent + "%";
                text.innerText = `FACE QUALITY: ${scorePercent}%`;

                if (score >= THRESHOLD_REG) {
                    bar.style.background = "var(--success)";
                    text.style.color = "var(--success)";
                    btn.disabled = false;
                    btn.innerText = "CAPTURE_FACE (READY)";
                } else {
                    bar.style.background = "var(--warning)";
                    text.style.color = "var(--warning)";
                    btn.disabled = true;
                    btn.innerText = `CAPTURE_FACE (${scorePercent}% < 85%)`;
                }
            } else {
                bar.style.width = "0%";
                text.innerText = "FACE QUALITY: 0% (NOT DETECTED)";
                text.style.color = "var(--danger)";
                btn.disabled = true;
            }
        }, 500);
    }

    // --- โหมดสแกนใบหน้า (ใช้เกณฑ์ 75% กรองคุณภาพ) ---
    async function startRecognition() {
        if(registeredUsers.length === 0) return alert("ยังไม่มีข้อมูลสมาชิก");
        
        document.getElementById('sys-status').innerText = "SCANNING_MODE: ACTIVE";

        const labeledDescriptors = await Promise.all(registeredUsers.map(async u => {
            try {
                const img = await faceapi.fetchImage(`https://lh3.googleusercontent.com/d/${u[1]}`);
                const d = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                return new faceapi.LabeledFaceDescriptors(u[0], [d.descriptor]);
            } catch(e) { return null; }
        }));

        faceMatcher = new faceapi.FaceMatcher(labeledDescriptors.filter(d => d), MATCH_ACCURACY);
        
        const video = document.getElementById('video');
        const canvas = faceapi.createCanvasFromMedia(video);
        document.getElementById('video-container').append(canvas);
        const displaySize = { width: video.offsetWidth, height: video.offsetHeight };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            const resized = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

            resized.forEach(d => {
                const box = d.detection.box;
                const flippedBox = { x: displaySize.width - box.x - box.width, y: box.y, width: box.width, height: box.height };
                
                // --- ตรวจสอบเกณฑ์ 75% ก่อนสแกนหาชื่อ ---
                if (d.detection.score < THRESHOLD_SCAN) {
                    new faceapi.draw.DrawBox(flippedBox, { label: "LOW_QUALITY", boxColor: "red" }).draw(canvas);
                    return; 
                }

                const match = faceMatcher.findBestMatch(d.descriptor);
                let color = (verifiedName === match.label) ? "#00ff88" : "#00d2ff";

                new faceapi.draw.DrawBox(flippedBox, { label: match.toString(), boxColor: color }).draw(canvas);

                // ตรวจจับการกระพริบตา (Blink Detection)
                const landmarks = d.landmarks;
                const leftEye = landmarks.getLeftEye();
                const ear = Math.abs(leftEye[1].y - leftEye[5].y);

                if (ear < 3.2 && match.label !== 'unknown') {
                    isBlinked = true;
                    handleCheckIn(match.label);
                }
            });
        }, 100);
    }

    async function handleCheckIn(name) {
        if (verifiedName === name || !isBlinked) return;
        verifiedName = name;
        
        document.getElementById('sys-status').innerText = "VERIFIED: " + name;
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'checkin', name: name }) });
        
        await refreshData();
        setTimeout(() => { verifiedName = ""; isBlinked = false; document.getElementById('sys-status').innerText = "SCANNING_MODE: ACTIVE"; }, 5000);
    }

    async function registerFace() {
        const name = document.getElementById('regName').value;
        if(!name) return alert("กรุณาใส่ชื่อ");

        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const base64 = canvas.toDataURL('image/jpeg').split(',')[1];

        document.getElementById('sys-status').innerText = "UPLOADING_ENCRYPTED_FACE...";
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'register', name: name, image: base64 }) });
        
        alert("Face Registered Successfully!");
        document.getElementById('regName').value = "";
        refreshData();
        document.getElementById('sys-status').innerText = "SYSTEM_READY";
    }

    async function refreshData() {
        try {
            const [uRes, dRes, aRes] = await Promise.all([
                fetch(SCRIPT_URL),
                fetch(SCRIPT_URL + "?type=dashboard"),
                fetch(SCRIPT_URL + "?type=attendance")
            ]);
            registeredUsers = await uRes.json();
            const dash = await dRes.json();
            const history = await aRes.json();

            document.getElementById('stat-total').innerText = dash.total;
            document.getElementById('stat-present').innerText = dash.present;
            document.getElementById('stat-absent').innerText = dash.absent;
            document.getElementById('attendance-list').innerHTML = history.map(h => `
                <div class="row present">
                    <div style="font-weight:600;">${h[0]}</div>
                    <div style="margin-left:auto; font-size:10px; font-family:'Orbitron'; color:var(--primary);">${new Date(h[1]).toLocaleTimeString('th-TH')}</div>
                </div>
            `).join('');
        } catch(e) { console.error("Data Sync Error"); }
    }
</script>
</body>
</html>
