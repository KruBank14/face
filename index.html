<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Check-in System</title>
    <!-- โหลด face-api.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #1a73e8; }
        .main-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 10px; background: #000; }
        .status-bar { margin: 15px 0; padding: 10px; border-radius: 5px; background: #e8f0fe; color: #1967d2; font-weight: bold; }
        .input-group { margin: 20px 0; display: flex; gap: 10px; justify-content: center; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 60%; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-reg { background: #1a73e8; color: white; }
        .btn-reg:hover { background: #1557b0; }
        .btn-scan { background: #34a853; color: white; width: 100%; font-size: 18px; }
        .btn-scan:hover { background: #2d8e47; }
        #overlay { position: absolute; top: 0; left: 0; }
        .video-wrapper { position: relative; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>📸 ระบบเช็คชื่อด้วยใบหน้า</h1>
        <div id="status" class="status-bar">กำลังโหลดโมเดล AI...</div>

        <div class="video-wrapper">
            <video id="video" autoplay muted></video>
        </div>

        <div class="input-group">
            <input type="text" id="userName" placeholder="ระบุชื่อเพื่อลงทะเบียน">
            <button class="btn-reg" onclick="register()">ลงทะเบียน</button>
        </div>

        <button class="btn-scan" onclick="startAttendance()">เริ่มโหมดเช็คชื่ออัตโนมัติ</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');
        
        // URL ของคุณที่ให้มา
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzh2ytLQUMlnBlekS2W1fX-bKHQJgRjCSLXDtiMpvLHDrqcbK8MlKMPtD6qu3ux-8X5/exec";
        
        // แหล่งเก็บไฟล์ Model AI
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';

        // 1. เริ่มต้นโหลด Model และเปิดกล้อง
        async function startSystem() {
            try {
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                statusText.innerText = "ระบบพร้อมใช้งาน";
            } catch (err) {
                statusText.innerText = "ข้อผิดพลาด: ไม่สามารถเข้าถึงกล้องได้";
                console.error(err);
            }
        }
        startSystem();

        // 2. ฟังก์ชันลงทะเบียน (ถ่ายรูปส่งไป Google Drive + บันทึกชื่อลง Sheet)
        async function register() {
            const name = document.getElementById('userName').value;
            if (!name) return alert("กรุณาใส่ชื่อก่อนครับ");

            statusText.innerText = "กำลังตรวจจับใบหน้า...";
            const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            
            if (!detection) {
                alert("ไม่พบใบหน้า กรุณาจัดหน้าให้อยู่กลางกล้อง");
                return;
            }

            statusText.innerText = "กำลังอัปโหลดรูปภาพ...";
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'register', name: name, image: base64Image })
                });
                alert("ลงทะเบียนคุณ " + name + " สำเร็จ!");
                document.getElementById('userName').value = "";
                statusText.innerText = "พร้อมใช้งาน";
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ Google Script");
            }
        }

        // 3. ฟังก์ชันเช็คชื่ออัตโนมัติ
        async function startAttendance() {
            statusText.innerText = "กำลังโหลดฐานข้อมูลใบหน้า...";
            
            try {
                // ดึงข้อมูล User ทั้งหมดจาก Google Script (doGet)
                const res = await fetch(SCRIPT_URL);
                const users = await res.json();

                if (users.length === 0) {
                    alert("ยังไม่มีข้อมูลในฐานข้อมูล กรุณาลงทะเบียนก่อน");
                    return;
                }

                const labeledDescriptors = await Promise.all(users.map(async user => {
                    const name = user[0];
                    const fileId = user[1];
                    const imgUrl = `https://lh3.googleusercontent.com/d/${fileId}`;
                    const img = await faceapi.fetchImage(imgUrl);
                    const detection = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                    return new faceapi.LabeledFaceDescriptors(name, [detection.descriptor]);
                }));

                const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
                statusText.innerText = "โหมดเช็คชื่อ: กำลังสแกน...";

                setInterval(async () => {
                    const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                    
                    detections.forEach(async fd => {
                        const match = faceMatcher.findBestMatch(fd.descriptor);
                        if (match.label !== 'unknown') {
                            statusText.innerText = "พบคุณ: " + match.label + " (บันทึกเวลาแล้ว)";
                            sendCheckIn(match.label);
                        }
                    });
                }, 3000);

            } catch (err) {
                console.error(err);
                alert("ไม่สามารถโหลดฐานข้อมูลได้");
            }
        }

        let lastChecked = "";
        async function sendCheckIn(name) {
            if (lastChecked === name) return;
            lastChecked = name;

            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'checkin', name: name })
            });

            // ป้องกันการบันทึกซ้ำซ้อนภายใน 10 วินาที
            setTimeout(() => { lastChecked = ""; }, 10000);
        }
    </script>
</body>
</html>
