<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Face ID Professional System</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .dashboard { display: flex; gap: 15px; margin-bottom: 20px; justify-content: center; }
        .card { background: white; padding: 15px 30px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .card h2 { margin: 5px 0; color: #1a73e8; }
        
        .main-content { display: flex; gap: 20px; justify-content: center; }
        .video-container { position: relative; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        video { border-radius: 10px; background: #000; display: block; }
        canvas { position: absolute; top: 15px; left: 15px; pointer-events: none; }
        
        .history-panel { width: 300px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .liveness-indicator { color: #e67e22; font-weight: bold; margin-bottom: 10px; }
        .btn-attendance { width: 100%; padding: 15px; background: #34a853; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- Feature 5: Dashboard -->
    <div class="dashboard">
        <div class="card">🚀 ทั้งหมด<h2 id="dash-total">0</h2></div>
        <div class="card">✅ มาแล้ว<h2 id="dash-present" style="color:green">0</h2></div>
        <div class="card">❌ ยังไม่มา<h2 id="dash-absent" style="color:red">0</h2></div>
    </div>

    <div class="main-content">
        <div class="video-container">
            <div id="liveness-status" class="liveness-indicator">โหมด: กรุณารอโหลดระบบ...</div>
            <video id="video" width="640" height="480" autoplay muted></video>
            <!-- Feature 1: Canvas สำหรับวาดกรอบจะถูกสร้างจาก JS -->
        </div>

        <div class="history-panel">
            <h3>🕒 ล่าสุด</h3>
            <div id="attendance-list" style="font-size: 0.9em;"></div>
            <hr>
            <input type="text" id="userName" placeholder="ชื่อเพื่อลงทะเบียน" style="width:70%; padding:8px;">
            <button onclick="register()" style="padding:8px; background:#1a73e8; color:white; border:none; border-radius:4px;">ลงทะเบียน</button>
            <button class="btn-attendance" onclick="startSystem()">เริ่มสแกนหน้า</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const SCRIPT_URL = "ใส่_URL_แอปเว็บ_ของคุณตรงนี้";
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
        let faceMatcher;
        let isLivenessPassed = false;

        window.onload = async () => {
            await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            updateDashboard();
            document.getElementById('liveness-status').innerText = "ระบบพร้อมสแกน";
        };

        // Feature 1 & 2: วาดกรอบ และ เช็คการกระพริบตา
        async function startSystem() {
            const res = await fetch(SCRIPT_URL);
            const users = await res.json();
            const labeledDescriptors = await Promise.all(users.map(async user => {
                const img = await faceapi.fetchImage(`https://lh3.googleusercontent.com/d/${user[1]}`);
                const det = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                return new faceapi.LabeledFaceDescriptors(user[0], [det.descriptor]);
            }));
            faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);

            const canvas = faceapi.createCanvasFromMedia(video);
            document.querySelector('.video-container').append(canvas);
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            document.getElementById('liveness-status').innerText = "👁️ กรุณากระพริบตาเพื่อเช็คชื่อ";

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                resizedDetections.forEach(detection => {
                    const match = faceMatcher.findBestMatch(detection.descriptor);
                    
                    // --- Feature 1: วาดกรอบและชื่อ ---
                    const box = detection.detection.box;
                    const drawBox = new faceapi.draw.DrawBox(box, { label: match.toString() });
                    drawBox.draw(canvas);

                    // --- Feature 2: Anti-Spoofing (Check Blink) ---
                    // คำนวณระยะห่างเปลือกตา (EAR) แบบง่าย
                    const landmarks = detection.landmarks;
                    const leftEye = landmarks.getLeftEye();
                    const rightEye = landmarks.getRightEye();
                    const distance = Math.abs(leftEye[1].y - leftEye[5].y); // ระยะแนวตั้งของตา
                    
                    if (distance < 3.5 && match.label !== 'unknown') { // ถ้าตาระยะแคบมาก = กระพริบตา
                        isLivenessPassed = true;
                        document.getElementById('liveness-status').innerText = "✅ ยืนยันตัวตนสำเร็จ!";
                        sendCheckIn(match.label);
                    }
                });
            }, 150);
        }

        // Feature 5: Update Dashboard
        async function updateDashboard() {
            const res = await fetch(SCRIPT_URL + "?type=dashboard");
            const data = await res.json();
            document.getElementById('dash-total').innerText = data.total;
            document.getElementById('dash-present').innerText = data.present;
            document.getElementById('dash-absent').innerText = data.absent;
            
            const res2 = await fetch(SCRIPT_URL + "?type=attendance");
            const history = await res2.json();
            document.getElementById('attendance-list').innerHTML = history.map(h => 
                `<div style="border-bottom:1px solid #eee; padding:5px;"><b>${h[0]}</b> - ${new Date(h[1]).toLocaleTimeString('th-TH')}</div>`
            ).join('');
        }

        let lastUser = "";
        async function sendCheckIn(name) {
            if (lastUser === name || !isLivenessPassed) return;
            lastUser = name;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'checkin', name: name }) });
            updateDashboard();
            setTimeout(() => { 
                lastUser = ""; 
                isLivenessPassed = false; 
                document.getElementById('liveness-status').innerText = "👁️ กรุณากระพริบตาเพื่อเช็คชื่อ";
            }, 5000);
        }

        async function register() {
            const name = document.getElementById('userName').value;
            const det = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg').split(',')[1];
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'register', name: name, image: base64 }) });
            alert("ลงทะเบียนสำเร็จ");
            updateDashboard();
        }
    </script>
</body>
</html>
