<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อนักเรียน</title>
    <!-- ใช้ Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; }
        .loading { display: none; text-align: center; margin: 20px 0; }
        .radio-group input[type="radio"] { display: none; }
        .radio-group label {
            padding: 5px 15px; border-radius: 20px; border: 1px solid #ccc;
            cursor: pointer; margin-right: 5px; font-size: 14px;
        }
        .radio-group input[value="มา"]:checked + label { background-color: #198754; color: white; border-color: #198754; }
        .radio-group input[value="ขาด"]:checked + label { background-color: #dc3545; color: white; border-color: #dc3545; }
        .radio-group input[value="ลา"]:checked + label { background-color: #ffc107; color: black; border-color: #ffc107; }
        .radio-group input[value="สาย"]:checked + label { background-color: #fd7e14; color: white; border-color: #fd7e14; }
    </style>
</head>
<body>

<div class="container mt-4 mb-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">📝 ระบบเช็คชื่อนักเรียน</h3>
            
            <div class="row mb-3">
                <div class="col-md-6">
                    <label>วันที่เช็คชื่อ:</label>
                    <input type="date" id="dateInput" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label>เลือกห้องเรียน:</label>
                    <select id="classSelect" class="form-select">
                        <option value="">กำลังโหลดข้อมูล...</option>
                    </select>
                </div>
            </div>

            <div id="loading" class="loading">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted" id="loadingText">กำลังประมวลผล...</p>
            </div>

            <div class="table-responsive mt-3" style="display: none;" id="tableContainer">
                <table class="table table-bordered table-hover bg-white">
                    <thead class="table-dark">
                        <tr>
                            <th width="10%">เลขที่</th>
                            <th width="40%">ชื่อ-สกุล</th>
                            <th width="50%">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="studentList">
                        <!-- รายชื่อนักเรียนจะแสดงที่นี่ -->
                    </tbody>
                </table>
                <div class="d-grid gap-2">
                    <button class="btn btn-primary btn-lg" onclick="saveData()">💾 บันทึกการเช็คชื่อ</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ตั้งค่า API URL
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbw7lWAsb-0G8PWefXxL0kXe_b1wxAvo88CV79uEP-Imir0K_d8GR4vzLVt3Hy6buAVK/exec"; // <--- เปลี่ยนเป็น Web App URL ของคุณ

    // เซ็ตวันที่ปัจจุบันเป็นค่าเริ่มต้น
    document.getElementById('dateInput').valueAsDate = new Date();

    // ==========================================
    // ฟังก์ชันเชื่อมต่อ API กลาง (เลี่ยง CORS ด้วย text/plain)
    // ==========================================
    async function fetchAPI(payload) {
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" }, // ใช้ text/plain แก้ปัญหา CORS
                body: JSON.stringify(payload)
            });
            return await response.json();
        } catch (error) {
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
            console.error(error);
            return null;
        }
    }

    // ==========================================
    // โหลดรายชื่อห้องเรียนตอนเปิดเว็บ
    // ==========================================
    async function loadConfig() {
        showLoading("กำลังโหลดข้อมูลตั้งค่า...");
        const res = await fetchAPI({ action: "getConfigAndStudents", className: "" });
        hideLoading();

        if (res && res.status === "success") {
            const select = document.getElementById("classSelect");
            select.innerHTML = '<option value="">-- กรุณาเลือกห้องเรียน --</option>';
            res.classes.forEach(c => {
                let opt = document.createElement("option");
                opt.value = c.trim();
                opt.textContent = c.trim();
                select.appendChild(opt);
            });
        }
    }

    // ==========================================
    // เมื่อเปลี่ยนห้องเรียน ให้ดึงรายชื่อเด็ก
    // ==========================================
    document.getElementById("classSelect").addEventListener("change", async function() {
        const className = this.value;
        if (!className) {
            document.getElementById("tableContainer").style.display = "none";
            return;
        }

        showLoading(`กำลังโหลดรายชื่อนักเรียน ${className}...`);
        document.getElementById("tableContainer").style.display = "none";

        const res = await fetchAPI({ action: "getConfigAndStudents", className: className });
        hideLoading();

        if (res && res.status === "success") {
            renderTable(res.students);
        }
    });

    // ==========================================
    // สร้างตารางรายชื่อพร้อมปุ่ม Radio
    // ==========================================
    function renderTable(students) {
        const tbody = document.getElementById("studentList");
        tbody.innerHTML = "";

        students.forEach(std => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td class="text-center align-middle">${std.number}</td>
                <td class="align-middle">${std.name}</td>
                <td>
                    <div class="radio-group" data-studentid="${std.studentId}">
                        <input type="radio" id="p_${std.studentId}" name="status_${std.studentId}" value="มา" checked>
                        <label for="p_${std.studentId}">มา</label>

                        <input type="radio" id="a_${std.studentId}" name="status_${std.studentId}" value="ขาด">
                        <label for="a_${std.studentId}">ขาด</label>

                        <input type="radio" id="l_${std.studentId}" name="status_${std.studentId}" value="ลา">
                        <label for="l_${std.studentId}">ลา</label>

                        <input type="radio" id="lt_${std.studentId}" name="status_${std.studentId}" value="สาย">
                        <label for="lt_${std.studentId}">สาย</label>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById("tableContainer").style.display = "block";
    }

    // ==========================================
    // รวบรวมข้อมูลและกดบันทึก
    // ==========================================
    async function saveData() {
        const dateStr = document.getElementById("dateInput").value;
        const className = document.getElementById("classSelect").value;
        
        if (!dateStr || !className) {
            alert("กรุณาเลือกวันที่และห้องเรียน");
            return;
        }

        // ดึงค่าสถานะของเด็กทุกคน
        let attendanceData = {};
        const radioGroups = document.querySelectorAll(".radio-group");
        
        radioGroups.forEach(group => {
            const studentId = group.getAttribute("data-studentid");
            const checkedRadio = group.querySelector('input[type="radio"]:checked');
            if (checkedRadio) {
                attendanceData[studentId] = checkedRadio.value;
            }
        });

        showLoading("กำลังบันทึกข้อมูล...");
        document.getElementById("tableContainer").style.display = "none";

        const payload = {
            action: "saveAttendance",
            className: className,
            date: dateStr,
            attendanceData: attendanceData
        };

        const res = await fetchAPI(payload);
        hideLoading();

        if (res && res.status === "success") {
            alert("บันทึกข้อมูลสำเร็จ!");
            document.getElementById("tableContainer").style.display = "block"; // แสดงตารางกลับมาเหมือนเดิม
        } else {
            alert("เกิดข้อผิดพลาด: " + (res ? res.message : ""));
            document.getElementById("tableContainer").style.display = "block";
        }
    }

    // UI Helpers
    function showLoading(text) {
        document.getElementById("loadingText").innerText = text;
        document.getElementById("loading").style.display = "block";
    }
    function hideLoading() {
        document.getElementById("loading").style.display = "none";
    }

    // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
    window.onload = loadConfig;

</script>
</body>
</html>
